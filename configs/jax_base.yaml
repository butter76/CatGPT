# JAX configuration for CatGPT training
# Override values via CLI: uv run python scripts/train_jax.py model.hidden_size=512

# Model architecture
model:
  name: "transformer"
  hidden_size: 768
  num_layers: 32
  num_heads: 48
  ff_dim: 1536  # Defaults to 4 * hidden_size
  attention_dim: null  # Expanded attention dim (null = hidden_size). E.g., 768 with 48 heads for 50% more attention capacity
  vocab_size: 26  # From tokenizer (don't change unless tokenizer changes)
  seq_length: 64  # Will be overridden by tokenizer.sequence_length
  activation: "gelu"
  # Position embedding type: "absolute" (learnable) or "magating" (multiplicative + additive gates)
  position_embedding: "magating"

  # Smolgen: dynamic attention bias generation
  # Generates position-dependent attention biases conditioned on input
  # See: https://lczero.org/blog/2024/02/transformer-progress/
  smolgen:
    enabled: true
    hidden_channels: 32  # Compression dimension
    hidden_size: 256     # Hidden layer size
    gen_size: 256        # Per-head generation dimension

  # Learnable per-layer residual gates (ignored when keel.enabled=true)
  # Each sublayer (attention, FFN) gets a learnable scalar that scales its output
  # See: https://arxiv.org/abs/2003.04887 (ReZero)
  residual_gates:
    enabled: false       # Enable learnable residual gates
    init_value: 1.0      # Initial gate value (0.0 for ReZero, 1.0 for identity)
    per_dim: true       # Use per-dimension gates instead of scalar

  # Keel: Post-LN with Highway-style connection for stable deep training
  # x_{l+1} = LN(α · x_l + F_l(LN(x_l))), where α = 2 * num_layers
  # First block degrades to Pre-LN for stable initialization.
  # When enabled, supersedes residual_gates.
  # See: https://arxiv.org/abs/2601.19895
  keel:
    enabled: true        # Enable Keel normalization (replaces Peri-LN)
    alpha: 6          # Highway scaling factor. null = auto (2 * num_layers = 32)

  # Output heads configuration
  output_heads:
    self_head: true      # Token reconstruction (auxiliary task for stability)
    value_head: true     # Win probability prediction (primary task)
    policy_head: true    # Policy prediction (primary task)
    self_weight: 0.1     # Loss weight for self head
    value_weight: 0.7    # Loss weight for value head
    policy_weight: 1.5    # Loss weight for policy head
    # LC0-style attention policy head: uses Q·K^T for 64x64 move logits
    policy_attention_head: true  # Use attention-based policy (vs simple Dense)
    policy_qk_dim: 32     # Q/K projection dimension
    soft_policy_head: false  # Enable soft policy
    soft_policy_temperature: 4.0  # KataGo default
    soft_policy_weight: 8.0  # KataGo default (compensates for smaller gradients)
    optimistic_policy_head: true  # Enable optimistic policy (value-surprise weighted)
    optimistic_policy_weight: 1.0  # Per-sample gating handles regularization
    optimistic_strength: 2.0  # Z-score threshold for optimism weighting
    wdl_weight: 0.05  # WDL classification (game result) - noisy, keep low

# Tokenizer configuration
tokenizer:
  sequence_length: 64
  include_halfmove: false

# Optimizer configuration
optimizer:
  name: "splus"  # Options: "adamw", "splus", "sgd"
  learning_rate: 0.20
  weight_decay: 0.01
  # AdamW/SGD specific
  b1: 0.9
  b2: 0.999
  eps: 1.0e-8
  # SPlus specific (only used when name="splus")
  splus_b1: 0.9
  splus_b2: 0.999
  splus_ema_rate: 0.999
  splus_inverse_every: 100
  splus_max_dim: 10000
  # Nonstandard scaling: params matching these strings (case-insensitive) get constant scaling
  # instead of shape-based scaling (2/(dim0+dim1)). Applies to 2D matrices only.
  splus_nonstandard_strings: ["layernorm"]
  splus_nonstandard_constant: 0.001

# Learning rate scheduler
# DeepSeek-V3 style: warmup → stable (constant peak) → cosine decay → cooldown (constant min)
# See: https://arxiv.org/abs/2412.19437 Section 4.2
scheduler:
  name: "deepseek"  # Options: "deepseek", "cosine", "linear", "constant"
  warmup_steps: 1000
  min_lr_ratio: 0.1  # Final LR = learning_rate * min_lr_ratio
  # DeepSeek schedule phase fractions (of post-warmup steps):
  stable_fraction: 0.68  # 68% at constant peak LR after warmup
  cooldown_fraction: 0.07  # 7% at constant min LR at end (remaining 25% = cosine decay)

# Training loop configuration
# Training is step-based with "pseudo-epochs" for validation/checkpointing
training:
  max_steps: 120000  # Total training steps
  steps_per_epoch: 6000  # Steps per pseudo-epoch (validation interval)
  batch_size: 1024
  gradient_clip: 1.0
  gradient_accumulation_steps: 1
  max_eval_steps: 200  # Max validation steps (prevents infinite loop)
  # JAX-specific options
  jit_compile: true  # JIT compile train/eval steps
  use_pmap: false  # Use pmap for multi-device (experimental)
  donate_argnums: true  # Donate buffers for memory efficiency
  # Mixed precision settings
  mixed_precision: true  # Enable bfloat16 mixed precision
  precision_dtype: "bfloat16"  # "bfloat16" or "float16"
  matmul_precision: "high"  # "default", "high" (TF32), or "highest" (full precision)

# Data loading
data:
  train_path: "~/training_bag_opt/training-run1-test80-202507*.bag"
  val_path: "~/training_bag_opt/training-run1-test80-202508*.bag"
  num_workers: 4
  prefetch_factor: 10
  seed: 42

# Checkpointing
checkpoint:
  dir: "checkpoints_jax"
  save_every_epochs: 1  # Save every N pseudo-epochs
  keep_last: 5
  save_optimizer: true
  use_orbax: true  # Use Orbax for checkpointing (recommended)

# Weights & Biases logging
wandb:
  enabled: true
  project: "catgpt-leela"
  entity: null  # Your W&B username or team
  run_name: null  # Auto-generated if null
  tags: ["jax"]
  log_every_steps: 10

# Training metrics configuration
metrics:
  # Layer gradient norms: L2 norm per transformer block, embeddings, output heads
  log_layer_grad_norms: true
  # Per-head gradient norms: L2 norm of gradients from each loss head
  # Requires extra backward passes - expensive but useful for debugging
  log_head_grad_norms: false
  head_grad_norm_every_steps: 100  # Compute every N steps to reduce overhead

# Distributed training (JAX-specific)
distributed:
  enabled: false
  mesh_shape: null  # e.g., [2, 4] for 2x4 device mesh
  data_axis: "data"  # Name of data parallelism axis

# Logging
logging:
  level: "INFO"

# Reproducibility
seed: 42
