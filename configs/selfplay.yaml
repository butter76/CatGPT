# CatGPT Selfplay Tournament Configuration
# Runs the C++ batched selfplay binary with W&B logging.
#
# Usage:
#   # Run with defaults (prompts for run name)
#   uv run python scripts/selfplay.py
#
#   # Override search params
#   uv run python scripts/selfplay.py evals=800 cpuct=2.0
#
#   # Override per-engine
#   uv run python scripts/selfplay.py challenger_evals=800 baseline_evals=400
#
#   # Disable W&B
#   uv run python scripts/selfplay.py wandb.enabled=false

# C++ binary (relative to project root)
cpp_build_dir: "cpp/build/bin"

# TensorRT engine
trt_engine: "sample.trt"

# Opening book
openings: "openings/UHO_2024/UHO_2024_+100_+109/UHO_2024_6mvs_+100_+109.epd"

# Tournament settings
pairs: 0            # 0 = one pair per opening
concurrent: 64      # Concurrent game slots
threads: 6          # Search worker threads
batch: 64           # Max GPU batch size

# Search algorithm: "fractional" (default) or "mcts"
search_type: "mcts"

# Search settings (apply to both engines unless overridden)
evals: 400          # Min GPU evals per move
cpuct: 1.75         # PUCT exploration constant

# MCTS-specific settings (only used when search_type=mcts)
fpu: 0.330               # FPU reduction (default: 0.003)
policy_temp: 1.3        # Policy temperature (default: 1.3, >1 flattens, <1 sharpens)
max_simulations: null    # Max MCTS simulations per move (default: 10000)

# Per-engine overrides (null = use shared value above)
baseline_evals: null
challenger_evals: null
baseline_cpuct: null
challenger_cpuct: null

# Engine labels
baseline_name: "Baseline"
challenger_name: "Challenger"

# Stockfish opponent (replaces baseline with Stockfish when enabled)
stockfish:
  enabled: true
  path: "stockfish"          # Binary path (or just name if on PATH)
  nodes: 70000               # Fixed node count for `go nodes`
  processes: 4               # Concurrent Stockfish subprocesses
  threads_per_process: 1     # UCI Threads option per process
  hash_mb: 16                # UCI Hash option (MB) per process

# Lc0 opponent (replaces baseline with Lc0 when enabled)
# When both lc0.enabled and stockfish.enabled, runs Lc0 (challenger) vs Stockfish (baseline)
lc0:
  enabled: false
  path: "/home/shadeform/lc0/build/release/lc0"
  weights: "/home/shadeform/lc0/build/release/BT3-768x15x24h-swa-2790000.pb.gz"
  nodes: 400                 # Fixed node count (MCTS playouts) for `go nodes`
  processes: 4               # Concurrent Lc0 subprocesses
  threads_per_process: 1     # UCI Threads option per process
  backend: "cuda-auto"       # Neural-net backend (cuda-auto, eigen, etc.)
  minibatch_size: 4          # NN minibatch size (0 = backend default)

# Syzygy tablebase adjudication
# Set to null to use $SYZYGY_HOME env var, or provide explicit path
syzygy_path: null

# PGN output (null = auto-generate from run name)
pgn_path: null

# Weights & Biases logging
wandb:
  enabled: true
  project: "catgpt-selfplay"
  entity: null
  tags:
    - "selfplay"

# Logging
verbose: false
